spring:
  datasource:
    url: jdbc:h2:mem:gateway-test-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""

management:
  tracing:
    sampling:
      probability: 1.0
    export:
      otlp:
        enabled: false

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        wait-duration-in-open-state: 200ms
