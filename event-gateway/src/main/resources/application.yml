server:
  port: 8080

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:file:./runtime-data/gateway/event-gateway;AUTO_SERVER=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:/db/gateway/schema.sql
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

clients:
  account:
    base-url: http://localhost:8081
