server:
  port: 8080

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:file:./runtime-data/gateway/event-gateway;AUTO_SERVER=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:/db/gateway/schema.sql
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  http:
    clients:
      imperative:
        factory: http-components
      connect-timeout: 300ms
      read-timeout: 800ms
      redirects: dont-follow
  cloud:
    circuitbreaker:
      bulkhead:
        resilience4j:
          enabled: false
      resilience4j:
        disable-thread-pool: true
        disable-time-limiter-map:
          accountService: true

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: count_based
        sliding-window-size: 6
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-failure-predicate: com.eventledger.gateway.config.AccountFailurePredicate
        ignore-exceptions:
          - com.eventledger.gateway.error.AccountNotFoundException
          - com.eventledger.gateway.error.DownstreamContractException

clients:
  account:
    base-url: http://localhost:8081

logging:
  structured:
    format:
      console: ecs

management:
  otlp:
    metrics:
      export:
        enabled: false
  endpoints:
    web:
      exposure:
        include: health,prometheus
