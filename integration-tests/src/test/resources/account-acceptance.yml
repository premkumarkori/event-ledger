server:
  port: 0

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:acceptance-account-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:/db/account/schema.sql
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

management:
  tracing:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
