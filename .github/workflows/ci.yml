# EXT-002: Java 17 verify on push/PR.
# Action majors frozen by the accepted project plan (reviewed 2026-07-14).
# This workflow does not run Docker/Compose.
name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  java-17:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify
        run: ./mvnw --batch-mode verify
