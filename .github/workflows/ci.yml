# Java 17 verification for the Maven project. The Compose demo is verified
# separately because this workflow does not run Docker.
name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  java-17:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify
        run: ./mvnw --batch-mode verify
